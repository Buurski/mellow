          - heading "Mellow er det sikre valg til festen" [level=2] [ref=e113]
          - generic [ref=e115]:
            - paragraph [ref=e116]: "Bryllup, runde dage, konfirmation eller barnedåb. Et selskab på Mellow bliver til en oplevelse, som gæsterne husker: skøn mad og en fest, der bliver præcist, som I ønsker det. Med hjælp fra kokken sammensætter vi en menu, som passer til anledningen og jeres smag og ønsker. I kan samle inspiration fra vores menukort eller blandt Mellows signaturretter, som er skabt til helt særlige lejligheder. Vores selskabspriser begynder ved 395 kr. pr. couvert – sammen finder vi frem til det, der matcher jeres ønsker."
            - paragraph [ref=e117]: Vi gør festen hyggelig, uanset om I har ti eller 200 gæster.
